<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo | Memória Potiguar</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>

<body class="body-cadastro">

<div class="container-cadastro">

    <img
        src="{{ url_for('static', filename='img/logo5.png') }}"
        class="login-logo"
        alt="Memória Potiguar"
    >

    <h2>Painel Administrativo</h2>

    <p class="login-subtitulo">
        Área restrita para gerenciamento dos pontos turísticos.
    </p>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="login-alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('cadastro') }}">

        <input
            type="text"
            name="username"
            placeholder="Usuário"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Senha"
            required
        >

        <button type="submit">
            Entrar
        </button>

    </form>

    <a class="voltar-site" href="{{ url_for('index') }}">
        ← Voltar ao site
    </a>

</div>

</body>
</html>
